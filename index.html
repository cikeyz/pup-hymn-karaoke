<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Character encoding for Filipino diacritics -->
    <meta charset="UTF-8">
    <!-- Responsive viewport meta tag for mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Page title shown in browser tab -->
    <title>PUP Hymn - Karaoke</title>

    <!-- Google Fonts: Outfit (headings) + DM Sans (body) - avoids generic defaults -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">

    <!-- External stylesheet for all visual styling -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Marquee ticker: required <marquee> tag, used as a branding info bar -->
    <div class="marquee-bar">
        <marquee behavior="scroll" direction="left" scrollamount="2">
            Polytechnic University of the Philippines | PUP Hymn | Sintang Paaralan | Tanglaw ka ng Bayan
        </marquee>
    </div>

    <!-- Main player container: flex column filling the viewport -->
    <main class="player">

        <!-- Header: PUP logo and university name -->
        <header class="header">
            <!-- PUP official logo loaded from same directory -->
            <img src="PUP-Logo.svg" alt="PUP Official Logo" class="logo">
            <!-- University name as primary heading -->
            <h1 class="title">Polytechnic University of the Philippines</h1>
            <!-- Subtitle indicating this is the hymn karaoke -->
            <p class="subtitle">PUP Hymn</p>
        </header>

        <!-- Lyrics panel: scrollable area populated by JavaScript -->
        <section class="lyrics-panel" id="lyricsPanel">
            <!-- Placeholder text shown before lyrics load -->
            <p class="lyrics-placeholder" id="lyricsPlaceholder">Press play to begin</p>
        </section>

        <!-- Audio controls bar pinned to the bottom -->
        <div class="controls">
            <!-- Hidden audio element: no autoplay, preloads metadata only -->
            <audio id="audio" src="PUP-Hymn.mp3" preload="metadata"></audio>

            <!-- Play/Pause toggle button with inline SVG icons -->
            <button class="play-btn" id="playBtn" aria-label="Play or Pause">
                <!-- Play triangle icon (visible by default) -->
                <svg class="icon-play" id="iconPlay" viewBox="0 0 24 24" fill="currentColor">
                    <polygon points="6,3 20,12 6,21" />
                </svg>
                <!-- Pause bars icon (hidden by default, shown when playing) -->
                <svg class="icon-pause" id="iconPause" viewBox="0 0 24 24" fill="currentColor" style="display:none">
                    <rect x="5" y="3" width="4" height="18" />
                    <rect x="15" y="3" width="4" height="18" />
                </svg>
            </button>

            <!-- Progress bar wrapper: current time + seekable bar + total time -->
            <div class="progress-wrapper">
                <!-- Current playback time display -->
                <span class="time-label" id="timeCurrent">0:00</span>
                <!-- Seekable progress bar container (supports click + drag) -->
                <div class="progress-container" id="progressContainer">
                    <!-- Filled portion of the progress bar -->
                    <div class="progress-fill" id="progressFill"></div>
                    <!-- Draggable thumb indicator -->
                    <div class="progress-thumb" id="progressThumb"></div>
                </div>
                <!-- Total duration display -->
                <span class="time-label" id="timeTotal">0:00</span>
            </div>
        </div>

    </main>

    <!-- External JavaScript for LRC parsing, sync, and controls -->
    <script src="script.js"></script>
</body>

</html>
