<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUP Hymn | Karaoke</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons Script (for UI Icons) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar / Album Info -->
        <aside class="now-playing">
            <div class="logo-container">
                <!-- Using absolute relative path according to instructions -->
                <img src="assets/PUP-Logo.svg" alt="PUP Logo" class="pup-logo">
            </div>
            <div class="track-info">
                <h1>PUP Hymn</h1>
                <p>Polytechnic University of the Philippines</p>
                <!-- Using marquee mechanically as requested by activity rules -->
                <div class="marquee-wrapper">
                    <marquee behavior="scroll" direction="left" scrollamount="4">
                        PUP Hymn - Polytechnic University of the Philippines - Sintang Paaralan, Tanglaw ka ng bayan...
                    </marquee>
                </div>
            </div>
        </aside>

        <!-- Lyrics View -->
        <main class="lyrics-container">
            <!-- Lyrics will be dynamically injected here via JavaScript -->
            <div id="lyrics-wrapper" class="lyrics-wrapper">
                <div class="lyrics-placeholder">Loading lyrics... Ensure you run this via Live Server!</div>
            </div>
        </main>

        <!-- Player Controls -->
        <footer class="player-controls">
            <!-- Audio source mapped to provided local path assumption -->
            <audio id="audio-player" src="assets/PUP-Hymn.mp3"></audio>

            <div class="progress-container" id="progress-container">
                <div class="progress-bar" id="progress-bar">
                    <!-- Progress fill width is updated dynamically in JS -->
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <div class="time-display">
                    <span id="current-time">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>

            <div class="controls-wrapper">
                <button class="control-btn" id="rewind-btn" title="Rewind 5s">
                    <i class="ph ph-rewind"></i>
                </button>
                <button class="control-btn play-pause-btn" id="play-pause-btn" title="Play">
                    <i class="ph-fill ph-play-circle" id="play-icon"></i>
                </button>
                <button class="control-btn" id="forward-btn" title="Forward 5s">
                    <i class="ph ph-fast-forward"></i>
                </button>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>

</html>
